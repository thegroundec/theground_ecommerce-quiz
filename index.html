<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我準備好做電商了嗎？｜電商起步診斷表</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efeb;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --blue-border: #378add;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
    --red-bg: #fcebeb;
    --red-text: #a32d2d;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    line-height: 1.6;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  /* Header */
  .page-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .brand-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .page-title {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .page-sub {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
  }
  .meta-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
  }
  .meta-item {
    font-size: 13px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meta-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border2);
  }

  /* Quiz area */
  #quiz-area { display: block; }
  #result-area { display: none; }

  /* Question block */
  .q-block {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 12px;
  }
  .q-number {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 5px;
  }
  .q-hint {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .opts { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--bg);
    transition: border-color 0.12s, background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:hover { border-color: var(--border2); background: var(--bg2); }
  .opt.sel {
    border-color: var(--blue-border);
    background: var(--blue-bg);
  }
  .opt-letter {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.12s;
  }
  .opt.sel .opt-letter {
    background: var(--blue-border);
    border-color: var(--blue-border);
    color: white;
  }
  .opt-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .opt.sel .opt-text { color: var(--blue-text); }

  /* Progress + submit */
  .bottom-bar {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.5rem;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .progress-wrap { flex: 1; }
  .progress-label {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 3px;
    background: var(--bg3);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue-border);
    border-radius: 99px;
    transition: width 0.3s;
    width: 0%;
  }
  .btn-submit {
    padding: 11px 22px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: opacity 0.12s;
  }
  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Result */
  .result-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem;
    margin-bottom: 12px;
  }
  .result-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    letter-spacing: 0.03em;
  }
  .tag-red { background: var(--red-bg); color: var(--red-text); }
  .tag-amber { background: var(--amber-bg); color: var(--amber-text); }
  .tag-green { background: var(--green-bg); color: var(--green-text); }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .score-big {
    font-size: 48px;
    font-weight: 600;
    line-height: 1;
  }
  .score-max {
    font-size: 16px;
    color: var(--text3);
  }
  .score-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 1.25rem;
  }
  .result-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .result-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
    margin-bottom: 1.25rem;
  }

  /* CTA box */
  .cta-box {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .cta-label {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .cta-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .btn-tally {
    display: block;
    width: 100%;
    padding: 13px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    font-family: inherit;
    transition: opacity 0.12s;
  }
  .btn-tally:hover { opacity: 0.85; }

  /* Breakdown */
  .breakdown-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 12px;
  }
  .breakdown-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  .bd-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .bd-item:last-child { border-bottom: none; }
  .bd-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dot-ok { background: #639922; }
  .dot-mid { background: #ba7517; }
  .dot-no { background: #e24b4a; }
  .bd-content { flex: 1; }
  .bd-q { font-size: 13px; color: var(--text2); line-height: 1.4; margin-bottom: 3px; }
  .bd-a { font-size: 12px; color: var(--text3); line-height: 1.4; }

  /* Retry */
  .retry-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    transition: background 0.12s;
    margin-top: 8px;
  }
  .retry-btn:hover { background: var(--bg3); }

  @media (max-width: 420px) {
    .page-title { font-size: 22px; }
    .score-big { font-size: 40px; }
    .bottom-bar { flex-direction: column; align-items: stretch; }
    .btn-submit { text-align: center; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="brand-tag">The Ground 電商啟動所</div>
    <h1 class="page-title">我準備好做電商了嗎？</h1>
    <p class="page-sub">7 題選擇題，花你 3 分鐘<br>看看你現在的電商起步準備度在哪裡</p>
    <div class="meta-row">
      <span class="meta-item">7 題</span>
      <span class="meta-dot"></span>
      <span class="meta-item">約 3 分鐘</span>
      <span class="meta-dot"></span>
      <span class="meta-item">立即看結果</span>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz-area"></div>

  <!-- Result -->
  <div id="result-area">
    <div class="result-card">
      <div id="r-tag"></div>
      <div class="score-row">
        <div class="score-big" id="r-score"></div>
        <div class="score-max">/ 100</div>
      </div>
      <div class="score-sub" id="r-sub"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-desc" id="r-desc"></div>
      <div class="cta-box">
        <div class="cta-label">想要 1 對 1 文字建議？</div>
        <div class="cta-text" id="r-cta-text"></div>
        <a class="btn-tally" href="https://lin.ee/tw4eptLC" target="_blank">加入 Line 官方帳號，領取專屬回饋 →</a>
      </div>
    </div>

    <div class="breakdown-card">
      <div class="breakdown-title">你的逐題結果</div>
      <div id="r-breakdown"></div>
    </div>

    <button class="retry-btn" onclick="resetQuiz()">重新作答</button>
  </div>

</div>

<script>
var qs = [
  {
    t: "你現在能不能用一句話說清楚：我的產品是賣給誰的？",
    h: "不是「對所有人都適合」，是一個具體的人",
    opts: [
      { l:"A", t:"可以，說得很清楚，連對方的需求和場景都想過了", s:3 },
      { l:"B", t:"大概知道，但說出來有點模糊", s:2 },
      { l:"C", t:"有想過，但每次說的版本都不太一樣", s:1 },
      { l:"D", t:"說實話，我以為「越多人買越好」", s:0 }
    ]
  },
  {
    t: "你的客人在決定購買前，通常會去哪裡搜尋或比較？",
    h: "這決定了你要在哪裡出現",
    opts: [
      { l:"A", t:"我知道，而且我在那些地方有布局或計劃", s:3 },
      { l:"B", t:"我猜是 Google 或 IG，但沒認真確認過", s:1 },
      { l:"C", t:"不確定，我只在自己習慣的平台發文", s:1 },
      { l:"D", t:"這個角度我從來沒想過", s:0 }
    ]
  },
  {
    t: "你說得出來，你跟賣類似產品的人最不一樣的是什麼嗎？",
    h: "不是「我的品質比較好」",
    opts: [
      { l:"A", t:"說得出來，而且能用一句話說清楚", s:3 },
      { l:"B", t:"有感覺，但說出來好像跟別人差不多", s:1 },
      { l:"C", t:"我的產品就是比較好，但具體哪裡不同說不太出來", s:1 },
      { l:"D", t:"這個問題讓我有點卡住", s:0 }
    ]
  },
  {
    t: "你選擇銷售平台的原因是？",
    h: "平台選錯，努力都在幫別人打工",
    opts: [
      { l:"A", t:"研究過客群習慣，選適合他們去的地方", s:3 },
      { l:"B", t:"參考同類型品牌的做法", s:2 },
      { l:"C", t:"看別人用覺得不錯就跟著用", s:1 },
      { l:"D", t:"還沒決定，或是隨便選一個先試", s:0 }
    ]
  },
  {
    t: "你的定價是怎麼算出來的？",
    h: "定價錯了，越賣越虧",
    opts: [
      { l:"A", t:"計算過成本、市場行情和目標利潤", s:3 },
      { l:"B", t:"對照競品，訂一個感覺合理的數字", s:2 },
      { l:"C", t:"憑感覺，覺得客人應該能接受", s:1 },
      { l:"D", t:"還沒認真想過定價這件事", s:0 }
    ]
  },
  {
    t: "上架後前三個月，你的流量打算從哪裡來？",
    h: "沒有流量計劃，等於開店不掛招牌",
    opts: [
      { l:"A", t:"有具體計劃，包含自然流量和社群管道", s:3 },
      { l:"B", t:"主要靠 IG 或社群慢慢累積", s:2 },
      { l:"C", t:"打算先跑廣告看看效果", s:1 },
      { l:"D", t:"說實話還沒想清楚這件事", s:0 }
    ]
  },
  {
    t: "如果上架兩個月都沒訂單，你知道要去哪裡找問題嗎？",
    h: "這題測的是你有沒有自我診斷的能力",
    opts: [
      { l:"A", t:"知道，我會從流量來源和產品頁開始看", s:3 },
      { l:"B", t:"大概知道方向，但沒有具體方法", s:2 },
      { l:"C", t:"可能會先問朋友或亂試看看", s:1 },
      { l:"D", t:"說實話我不知道從哪裡下手", s:0 }
    ]
  }
];

var answers = new Array(qs.length).fill(null);

function buildQuiz() {
  var area = document.getElementById('quiz-area');
  area.innerHTML = '';
  qs.forEach(function(q, qi) {
    var block = document.createElement('div');
    block.className = 'q-block';
    var html = '<div class="q-number">第 ' + (qi+1) + ' 題 / ' + qs.length + '</div>';
    html += '<div class="q-text">' + q.t + '</div>';
    html += '<div class="q-hint">' + q.h + '</div>';
    html += '<div class="opts">';
    q.opts.forEach(function(o, oi) {
      html += '<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="pick('+qi+','+oi+')">';
      html += '<div class="opt-letter">'+o.l+'</div>';
      html += '<div class="opt-text">'+o.t+'</div></div>';
    });
    html += '</div>';
    block.innerHTML = html;
    area.appendChild(block);
  });

  var bar = document.createElement('div');
  bar.className = 'bottom-bar';
  bar.innerHTML = '<div class="progress-wrap"><div class="progress-label" id="prog-label">已作答 0 / ' + qs.length + ' 題</div><div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div></div><button class="btn-submit" id="btn-submit" onclick="showResult()" disabled>看我的結果 →</button>';
  area.appendChild(bar);
}

function pick(qi, oi) {
  var grp = document.querySelectorAll('[id^="opt-'+qi+'-"]');
  grp.forEach(function(el) { el.classList.remove('sel'); });
  document.getElementById('opt-'+qi+'-'+oi).classList.add('sel');
  answers[qi] = { score: qs[qi].opts[oi].s, text: qs[qi].opts[oi].t };
  var filled = answers.filter(function(a){ return a !== null; }).length;
  document.getElementById('prog-label').textContent = '已作答 ' + filled + ' / ' + qs.length + ' 題';
  document.getElementById('prog-fill').style.width = Math.round(filled/qs.length*100) + '%';
  document.getElementById('btn-submit').disabled = (filled < qs.length);
}

function showResult() {
  var total = answers.reduce(function(a,b){ return a + b.score; }, 0);
  var max = qs.length * 3;
  var pct = Math.round(total / max * 100);

  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';

  document.getElementById('r-score').textContent = pct;
  document.getElementById('r-sub').textContent = '滿分 100 分｜共 ' + qs.length + ' 題';

  var tag, title, desc, cta;
  if (pct <= 40) {
    tag = '<div class="result-tag tag-red">地基還沒打好</div>';
    title = '先停下來，把這幾件事想清楚再動';
    desc = '很多人在這個階段直接衝去上架，結果花了錢和時間，才發現方向不對。你現在有機會在開始之前把地基蓋穩——這不是慢，是真的比較快。';
    cta = '把你的結果留給我，我告訴你從哪一件事開始最有效率，幫你少走三年彎路。';
  } else if (pct <= 70) {
    tag = '<div class="result-tag tag-amber">有在準備，但有缺口</div>';
    title = '方向對了，有幾個洞需要在上架前補起來';
    desc = '你已經想了不少，但幾個沒答好的地方很可能在上架後變成卡關點。現在補，比上架後才發現好處理得多。';
    cta = '留下聯絡方式，我幫你看哪個缺口最值得先補，給你具體的文字建議。';
  } else {
    tag = '<div class="result-tag tag-green">準備度不錯</div>';
    title = '你比大多數新手想得更清楚';
    desc = '這幾件事你都有想過，代表你的起點比大部分人穩。接下來的問題不是有沒有準備好，而是怎麼把這些落地成真正的行動。';
    cta = '留下聯絡方式，我們可以聊聊你的第一步具體怎麼走最有效。';
  }

  document.getElementById('r-tag').innerHTML = tag;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-desc').textContent = desc;
  document.getElementById('r-cta-text').textContent = cta;

  var bd = document.getElementById('r-breakdown');
  bd.innerHTML = '';
  qs.forEach(function(q, i) {
    var a = answers[i];
    var dc = a.score === 3 ? 'dot-ok' : (a.score >= 1 ? 'dot-mid' : 'dot-no');
    var el = document.createElement('div');
    el.className = 'bd-item';
    el.innerHTML = '<div class="bd-dot ' + dc + '"></div><div class="bd-content"><div class="bd-q">' + q.t + '</div><div class="bd-a">你的選擇：' + a.text + '</div></div>';
    bd.appendChild(el);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  answers = new Array(qs.length).fill(null);
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
